version: '3.8'

services:
  api:
    build: .
    container_name: bacen_compliance_api
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      # Mapeia a pasta local para não precisar reconstruir o container a cada mudança de código
      - .:/app
    environment:
      # Puxa as variáveis do seu arquivo .env local para dentro do container
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: >
      uv run uvicorn src.presentation.api.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8080} --reload
