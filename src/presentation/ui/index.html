<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>BACEN Compliance AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --user-msg: rgba(59, 130, 246, 0.2);
            --ai-msg: rgba(30, 41, 59, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
        }
        .header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
        .header span { font-size: 0.8rem; color: #10b981; display: flex; align-items: center; gap: 5px; }
        .header span::before { content: ""; width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; }
        
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-msg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .message .meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover { background: var(--accent-hover); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        
        .loader {
            display: none;
            align-self: flex-start;
            padding: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--text-muted);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>BACEN Compliance Agent</h1>
        <span>Sistemas Operacionais Online</span>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message ai">
            Olá! Sou o agente de Compliance treinado nos normativos do BACEN. Como posso ajudar a responder à dúvida do seu cliente hoje?
        </div>
    </div>
    
    <div class="loader" id="loader">
        <div class="spinner"></div> Auditando normativos e gerando resposta...
    </div>

    <form class="input-area" id="chatForm">
        <input type="text" id="queryInput" placeholder="Ex: Qual o prazo para devolução do pix?" autocomplete="off" required>
        <button type="submit" id="sendBtn">Enviar</button>
    </form>
</div>

<script>
    const form = document.getElementById('chatForm');
    const input = document.getElementById('queryInput');
    const chatBox = document.getElementById('chatBox');
    const loader = document.getElementById('loader');
    const sendBtn = document.getElementById('sendBtn');
    
    // Thread ID persistente para a sessão
    const threadId = 'sessao_' + Math.random().toString(36).substr(2, 9);

    function addMessage(text, sender, meta = '') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        
        let htmlContent = text.replace(/\n/g, '<br>');
        if (meta) {
            htmlContent += `<div class="meta"><span>${meta}</span></div>`;
        }
        
        msgDiv.innerHTML = htmlContent;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = input.value.trim();
        if (!query) return;

        addMessage(query, 'user');
        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;
        loader.style.display = 'flex';
        chatBox.appendChild(loader); // Move loader para o fim
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/api/v1/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query, thread_id: threadId })
            });

            if (!response.ok) throw new Error('Erro na API');
            
            const data = await response.json();
            const metaInfo = `⏱️ Latência: ${data.latency_ms}ms | 📚 Fonte: ${data.citations[0].source_file}`;
            
            addMessage(data.answer, 'ai', metaInfo);
        } catch (error) {
            addMessage("⚠️ Erro: Não foi possível contatar o Agente. Verifique se a GROQ_API_KEY está configurada e o backend está online.", 'ai');
        } finally {
            loader.style.display = 'none';
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }
    });
</script>
</body>
</html>
