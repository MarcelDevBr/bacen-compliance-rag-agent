app:
  name: "BACEN Compliance RAG"
  environment: "development"

llm:
  provider: "groq"
  model_name: "llama3-70b-8192"
  temperature: 0.1
  free_tier_mode: true

rag:
  chunk_size: 1000
  chunk_overlap: 200
  retriever:
    top_k: 5
  reranker:
    enabled: true
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 2

telemetry:
  langfuse:
    enabled: false

prompts:
  analyst:
    system: "Atue como um Especialista em Normativas do Banco Central. Responda à dúvida do usuário com precisão técnica, baseando-se exclusivamente no contexto fornecido. Não assuma ou gere informações ausentes no texto base."
    user: "PERGUNTA:\n{question}\n\nDOCUMENTOS RECUPERADOS:\n{context}"
  reviewer:
    system: "Atue como Auditor de Compliance. Revise o rascunho do analista em relação às normativas oficiais. Diretrizes: 1) Remova informações que não constam estritamente nas normativas fornecidas. 2) Reescreva de forma clara e objetiva. 3) Formate a saída em Markdown estruturado."
    user: "RASCUNHO DO ANALISTA:\n{draft}\n\nNORMATIVAS OFICIAIS:\n{context}"
